name: CI/CD Backend Deployment

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials (for ECR push)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3️⃣ Login to ECR (on GitHub runner, to push Docker image)
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t backend-images:latest .
          docker tag backend-images:latest 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest

      # 5️⃣ Push Docker image to ECR
      - name: Push Docker image to ECR
        run: |
          docker push 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest

      # 6️⃣ Deploy to EC2 #1
      - name: Deploy to EC2 #1
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_1 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR on EC2
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 949156002967.dkr.ecr.ap-south-1.amazonaws.com

            # Stop & remove old container
            docker stop backend || true
            docker rm backend || true

            # Remove old images
            docker rmi backend-images:latest || true
            docker rmi 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest || true

            # Pull latest image and run
            docker pull 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest
            docker run -d -p 3000:3000 --name backend --restart unless-stopped 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest

      # 7️⃣ Deploy to EC2 #2
      - name: Deploy to EC2 #2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR on EC2
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 949156002967.dkr.ecr.ap-south-1.amazonaws.com

            # Stop & remove old container
            docker stop backend || true
            docker rm backend || true

            # Remove old images
            docker rmi backend-images:latest || true
            docker rmi 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest || true

            # Pull latest image and run
            docker pull 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest
            docker run -d -p 3000:3000 --name backend --restart unless-stopped 949156002967.dkr.ecr.ap-south-1.amazonaws.com/backend-images:latest
